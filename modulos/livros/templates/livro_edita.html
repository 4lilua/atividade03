{% extends 'base.html' %}

{% block conteudo %}
    {% set mensagens = get_flashed_messages() %}
    {% if mensagens %}
        {% for msg in mensagens %}
            <div>
                {{ msg }}
            </div>
        {% endfor %}
    {% endif %}
    <form action="/livros/editasave" method="post">
        <fieldset>
            <input type="hidden" name="id" value="{{dados.id}}">
            <div>
                <label for="titulo">Título: </label>
                <input type="text" name="titulo" id="titulo" value="{{dados.titulo}}" required>
            </div>
            <div>
                <label for="ano_publicacao">Ano de publicação: </label>
                <input type="number" name="ano_publicacao" id="ano_publicacao" value="{{dados.ano_publicacao}}" required>
            </div>
                <label for="autor_id">Nome do autor: </label>
                <select id="autor_id" name="autor_id" required>
                    {% for a in autor %}
                        {% if a.id == dados.autor_id %}
                        <option value="{{a.id}}" selected >{{a.nome}}</option>
                        {% else %}
                        <option value="{{a.id}}" >{{a.nome}}</option>
                        {% endif %}
                    {% endfor %}
                </select>
            <button type="submit">Salvar</button>
        </fieldset>
    </form>

{% endblock %}
