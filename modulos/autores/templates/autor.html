{% extends 'base.html'%}

{% block conteudo %}
    {% set mensagens  = get_flashed_messages() %}
    {% if mensagens %}
        {% for msg in mensagens %}
            <div>
                {{ msg }}
            </div>
        {% endfor %}
    {% endif %}
    <div>
        <a href="/autores/add">Adicionar</a>
    </div>
    <table>
        <tr>
            <th>Nome</th>
            <th>Nacionalidade</th>
        </tr>
        {% for a in autores %}
        <tr>
            <td>{{a.nome}}</td>
            <td>{{a.nacionalidade}}</td>
        </tr>
        {% endfor %}
    </table>

{% endblock %}
